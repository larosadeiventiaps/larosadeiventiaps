name: Deploy su FTP Ergonet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy su FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync con FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.larosadeiventiaps.org
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /httpdocs/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            .claude/**
            .superpowers/**
            docs/**
            new-site/**
            README.md
